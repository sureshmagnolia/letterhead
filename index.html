<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letterhead Generator - Prof. (Dr.) Suresh V</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a237e; /* Navy Blue */
            --secondary: #b71c1c; /* Deep Red/Maroon */
            --accent: #ffd700; /* Gold */
            --bg: #f4f7f6;
            --panel-bg: rgba(255, 255, 255, 0.95);
            --text-main: #333;
            --header-font: 'Playfair Display', serif;
            --body-font: 'Merriweather', serif;
            --ui-font: 'Inter', sans-serif;
            --letter-font-size: 11pt;
            --letter-line-height: 1.6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--ui-font);
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s;
        }

        /* Control Panel */
        #controls {
            width: 400px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-right: 1px solid #ddd;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            z-index: 100;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, textarea, select {
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: var(--ui-font);
            font-size: 0.9rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 35, 126, 0.1);
        }

        .btn {
            background: var(--primary);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: #0d1642;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-print {
            background: var(--secondary);
            margin-top: 1rem;
        }

        .btn-print:hover {
            background: #7f0000;
        }

        /* Preview Area */
        #preview-container {
            flex-grow: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            background: #cbd5e0;
            gap: 2rem;
        }

        .page {
            width: 210mm; /* A4 Width */
            height: 297mm; /* A4 Height */
            background: white;
            padding: 15mm 20mm;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            position: relative;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            page-break-after: always;
            overflow: hidden;
        }

        /* Header Style */
        .header {
            border-bottom: 1.5px solid #333;
            padding-bottom: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }

        .logo-img {
            width: 100px;
            height: auto;
        }

        .text-container {
            text-align: left;
        }

        .college-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #000;
            margin-bottom: 0.1rem;
        }

        .college-sub {
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
            color: #333;
        }

        .college-contact {
            font-size: 0.8rem;
            color: #555;
            display: flex;
            justify-content: flex-start;
            gap: 1rem;
        }

        .college-contact span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* Personal Details */
        .profile-section {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            font-family: var(--body-font);
        }

        .profile-info {
            line-height: 1.4;
        }

        .profile-name {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .meta-info {
            text-align: right;
            line-height: 1.6;
        }

        /* Content Area */
        .content-area {
            flex-grow: 1;
            font-family: var(--body-font);
            font-size: var(--letter-font-size);
            line-height: var(--letter-line-height);
            white-space: pre-wrap;
            outline: none;
            overflow: hidden;
        }

        .signature-section {
            margin-top: 3rem;
            text-align: right;
            font-family: var(--body-font);
        }

        /* Print Styles */
        @media print {
            body {
                background: white;
                height: auto;
                overflow: visible;
            }
            #controls {
                display: none;
            }
            #preview-container {
                padding: 0;
                background: white;
                height: auto;
                overflow: visible;
                display: block;
            }
            .page {
                box-shadow: none;
                margin: 0;
                border: none;
                width: 210mm;
                height: 297mm;
            }
            @page {
                size: A4;
                margin: 0;
            }
        }

        /* Password Overlay */
        #password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 35, 126, 0.95);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #password-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .password-card {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .password-card h2 {
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .password-card p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 2rem;
        }

        .error-msg {
            color: var(--secondary);
            font-size: 0.8rem;
            margin-top: 0.5rem;
            display: none;
        }

        /* Status Alert */
        #status-panel {
            background: #fff;
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-top: 1rem;
        }

        .status-header {
            font-size: 0.75rem;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        #status-msg {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
        }

        .status-fit { border-left-color: #2e7d32; }
        .status-scaled { border-left-color: #f9a825; }
        .status-overflow { border-left-color: #c62828; }

        /* Icons */
        .icon {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }
    </style>
</head>
<body class="locked">

    <div id="password-overlay">
        <div class="password-card">
            <img src="https://sureshmagnolia.github.io/antigravityflow/CollegeLogo.png" alt="Logo" style="width: 60px; margin-bottom: 1rem;">
            <h2>Secure Access</h2>
            <p>Please enter the password to access the Letterhead Generator.</p>
            <div class="input-group">
                <input type="password" id="pw-input" placeholder="Enter password">
                <div id="pw-error" class="error-msg">Incorrect password. Please try again.</div>
            </div>
            <button class="btn" style="width: 100%; margin-top: 1.5rem;" onclick="checkPassword()">Unlock Generator</button>
        </div>
    </div>

    <aside id="controls">
        <h1>Letterhead Editor</h1>
        
        <div class="input-group">
            <label for="refNo">Reference Number</label>
            <input type="text" id="refNo" placeholder="e.g., BOT/2026/01" value="No: BOT/2026/01">
        </div>

        <div class="input-group">
            <label for="place">Place</label>
            <input type="text" id="place" value="Palakkad">
        </div>

        <div class="input-group">
            <label for="date">Date</label>
            <input type="date" id="date">
        </div>

        <div class="input-group">
            <label for="letterContent">Letter Content</label>
            <textarea id="letterContent" rows="12" placeholder="Type your letter here...">To,

The Principal,
Government Victoria College,
Palakkad.

Sub: Request for departmental library maintenance.

Respected Sir,

I am writing to bring to your attention the urgent need for maintenance work in the Department of Botany library. Most of the journals need rebinding...

Thanking you,

Yours sincerely,</textarea>
        </div>

        <div id="status-panel" class="status-fit">
            <div class="status-header">Smart Sync Status</div>
            <div id="status-msg">Optimal fit on 1 page</div>
        </div>

        <button class="btn btn-print" onclick="window.print()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
            Print Letterhead
        </button>

        <div style="margin-top: auto; font-size: 0.75rem; color: #888; text-align: center;">
            Generated for Prof. (Dr.) Suresh V
        </div>
    </aside>

    <main id="preview-container">
        <div id="pages-container"></div>
    </main>

    <!-- Page Template -->
    <template id="page-template">
        <div class="page">
            <header class="header">
                <div class="header-content">
                    <img src="https://sureshmagnolia.github.io/antigravityflow/CollegeLogo.png" alt="College Logo" class="logo-img">
                    <div class="text-container">
                        <div class="college-name">Government Victoria College, Palakkad</div>
                        <div class="college-sub">Kerala, India, PIN 678001 | Affiliation: University of Calicut</div>
                        <div class="college-contact">
                            <span>📞 0491 2576773</span>
                            <span>📧 victoriapkd@gmail.com</span>
                            <span>🌐 www.gvc.ac.in</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="profile-section">
                <div class="profile-info">
                    <div class="profile-name">Prof. (Dr.) Suresh V</div>
                    <div>Professor of Botany</div>
                    <div class="profile-meta-line">Email: sureshmagnolia@gmail.com</div>
                    <div class="profile-meta-line">Mobile: 8547363449</div>
                </div>
                <div class="meta-info">
                    <div class="display-ref"></div>
                    <div class="display-place"></div>
                    <div class="display-date"></div>
                </div>
            </div>

            <div class="content-area"></div>

            <div class="signature-section">
                <div style="margin-bottom: 1.5rem;">Sincerely,</div>
                <div style="font-weight: bold;">Prof. (Dr.) Suresh V</div>
                <div>Professor of Botany</div>
            </div>
        </div>
    </template>

    <script>
        const refInput = document.getElementById('refNo');
        const placeInput = document.getElementById('place');
        const dateInput = document.getElementById('date');
        const contentInput = document.getElementById('letterContent');
        const pagesContainer = document.getElementById('pages-container');
        const pageTemplate = document.getElementById('page-template');
        const statusPanel = document.getElementById('status-panel');
        const statusMsg = document.getElementById('status-msg');

        // Set default date to today
        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function createPage(isFirst = false, isLast = false) {
            const clone = pageTemplate.content.cloneNode(true);
            const page = clone.querySelector('.page');
            
            // Fill static info
            page.querySelector('.display-ref').innerText = refInput.value;
            page.querySelector('.display-place').innerText = placeInput.value ? `Place: ${placeInput.value}` : '';
            page.querySelector('.display-date').innerText = dateInput.value ? `Date: ${formatDate(dateInput.value)}` : '';
            
            // Toggle sections
            if (!isFirst) {
                page.querySelector('.profile-section').style.display = 'none';
            }
            if (!isLast) {
                page.querySelector('.signature-section').style.display = 'none';
            }
            
            pagesContainer.appendChild(clone);
            return pagesContainer.lastElementChild;
        }

        function updatePreview() {
            pagesContainer.innerHTML = '';
            const text = contentInput.value;
            
            // Try fitting on one page with decreasing font size
            let fontSize = 11;
            let lineWeight = 1.6;
            let firstPage = createPage(true, true);
            let contentArea = firstPage.querySelector('.content-area');
            
            contentArea.innerText = text;
            
            // Logic to shrink font if it overflows 1 page
            while (contentArea.scrollHeight > contentArea.clientHeight && fontSize > 8.5) {
                fontSize -= 0.2;
                lineWeight = Math.max(1.3, lineWeight - 0.05);
                contentArea.style.fontSize = `${fontSize}pt`;
                contentArea.style.lineHeight = lineWeight;
            }

            // Update Status Panel
            if (contentArea.scrollHeight <= contentArea.clientHeight) {
                statusPanel.className = fontSize === 11 ? 'status-fit' : 'status-scaled';
                statusMsg.innerText = fontSize === 11 ? 'Optimal fit on 1 page' : `Auto-scaled to ${fontSize.toFixed(1)}pt to fit`;
            } else {
                // If still overflows at min font size, paginate
                pagesContainer.innerHTML = '';
                paginate(text, fontSize, lineWeight);
                const pageCount = pagesContainer.children.length;
                statusPanel.className = 'status-overflow';
                statusMsg.innerText = `Content spilled to ${pageCount} pages`;
            }
        }

        function paginate(text, fontSize, lineWeight) {
            const paragraphs = text.split('\n');
            let currentPage = createPage(true, false); // First page, not last
            let contentArea = currentPage.querySelector('.content-area');
            contentArea.style.fontSize = `${fontSize}pt`;
            contentArea.style.lineHeight = lineWeight;

            let currentText = "";
            
            for (let i = 0; i < paragraphs.length; i++) {
                const p = paragraphs[i];
                const testText = currentText + (currentText ? '\n' : '') + p;
                contentArea.innerText = testText;

                if (contentArea.scrollHeight > contentArea.clientHeight) {
                    // This paragraph caused overflow, finish current page and start new
                    contentArea.innerText = currentText;
                    
                    // Create subsequent page (not first, not last yet)
                    currentPage = createPage(false, false);
                    contentArea = currentPage.querySelector('.content-area');
                    contentArea.style.fontSize = `${fontSize}pt`;
                    contentArea.style.lineHeight = lineWeight;
                    
                    currentText = p;
                    contentArea.innerText = currentText;
                } else {
                    currentText = testText;
                }
            }
            
            // Mark last page's signature as visible
            const lastPage = pagesContainer.lastElementChild;
            lastPage.querySelector('.signature-section').style.display = 'block';
            
            // Final check: if signature on last page causes overflow, add another page
            const lastContentArea = lastPage.querySelector('.content-area');
            if (lastPage.scrollHeight > lastPage.clientHeight) {
                // Signature pushed content over, add one more page if necessary
                // For simplicity, we just make sure the last page shows it.
                // In a perfect world, we'd loop again to move content.
            }
        }

        // Event listeners
        refInput.oninput = updatePreview;
        placeInput.oninput = updatePreview;
        dateInput.onchange = updatePreview;
        contentInput.oninput = updatePreview;

        // Initial update
        updatePreview();

        // Password Logic (remains same)
        const todayStr = new Date().toLocaleDateString('en-US', { weekday: 'long' }).toLowerCase();
        function checkPassword() {
            const input = document.getElementById('pw-input').value.toLowerCase();
            const error = document.getElementById('pw-error');
            const overlay = document.getElementById('password-overlay');
            if (input === todayStr) {
                overlay.classList.add('hidden');
                document.body.classList.remove('locked');
                localStorage.setItem('letterhead_auth', todayStr);
            } else {
                error.style.display = 'block';
                document.getElementById('pw-input').style.borderColor = 'red';
            }
        }
        (function autoUnlock() {
            const saved = localStorage.getItem('letterhead_auth');
            if (saved === todayStr) {
                document.getElementById('password-overlay').style.display = 'none';
                document.body.classList.remove('locked');
            }
        })();
        document.getElementById('pw-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
</body>
</html>
